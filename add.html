<!doctype html>
<html lang="en">

<head>
    <title>Product Managment</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand logo fs-4" href="#">Product<span>Mg</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle fs-5" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                Products
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="./add.html">Add Products</a></li>
                                <li><a class="dropdown-item" href="./view.html">View Products</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                            </ul>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="add-pro">
        <div class="container py-5">
            <h2 class="text-center title fw-bold">Add Products Data</h2>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="border p-3 shadow-2" id="form">
                        <form action="" method="post" id="productForm">
                            <div class="mb-3">
                                <label for="productName" class="form-label fw-medium">Name</label>
                                <input type="text" id="productName" name="name" class="form-control"
                                    placeholder="Product Name">
                            </div>
                            <div class="mb-3">
                                <label for="productImage" class="form-label fw-medium">Image</label>
                                <input type="url" id="productImage" name="image" class="form-control"
                                    placeholder="Image">
                            </div>
                            <div class="mb-3">
                                <label for="productPrice" class="form-label fw-medium">Price</label>
                                <input type="number" id="productPrice" min="500" max="5000" name="price"
                                    class="form-control" placeholder="Price">
                            </div>
                            <div class="mb-3">
                                <label for="productCategory" class="form-label fw-medium">Category</label>
                                <select id="productCategory" name="category" class="form-control">
                                    <option selected disabled>Select Category </option>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Home & Garden">Home & Garden</option>
                                    <option value="Health & Care">Health & Care</option>
                                    <option value="Toys & Gaming">Toys & Gaming</option>
                                    <option value="Books & Stationary">Books & Stationary</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label for="productStock" class="form-label fw-medium">Stock</label>
                                <input type="number" id="productStock" min="10" max="500" name="stock"
                                    class="form-control" placeholder="Stock">
                            </div>
                            <div class="mb-3">
                                <label for="productDescription" class="form-label fw-medium">Description</label>
                                <textarea class="form-control" name="description" id="productDescription"
                                    rows="3"></textarea>
                            </div>
                            <button type="submit" class="btn add-btn fw-medium">Add Product</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>
</body>

</html>
