<!doctype html>
<html lang="en">

<head>
    <title>Product Managment</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- Bootstrap CSS v5.2.1 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous" />
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>

    <header>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand logo fs-4" href="#">Product<span>Mg</span></a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent"
                    aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarSupportedContent">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle fs-5" href="#" role="button" data-bs-toggle="dropdown"
                                aria-expanded="false">
                                Products
                            </a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="./add.html">Add Products</a></li>
                                <li><a class="dropdown-item" href="./view.html">View Products</a></li>
                                <li>
                                    <hr class="dropdown-divider">
                                </li>
                            </ul>
                        </li>
                    </ul>
                    <form class="d-flex" role="search">
                        <input class="form-control me-2 " type="search" placeholder="Search" aria-label="Search" />
                        <button class="btn btn-outline-success search" type="submit">Search</button>
                    </form>
                </div>
            </div>
        </nav>
    </header>

    <main>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <table class="table table-bordered table-hover table-striped table-responsive mt-3" id="viewTable">
                    <h2 class="text-center mt-5">View Products</h2>
                    <div class="sort">
                        <ul class="list-unstyled d-flex">
                            <li class="sort-category mt-1">
                                <select id="productCategory" name="category" class="form-control my-1">
                                    <option selected disabled>Select Category </option>
                                    <option value="Electronics">Electronics</option>
                                    <option value="Home & Garden">Home & Garden</option>
                                    <option value="Health & Care">Health & Care</option>
                                    <option value="Toys & Gaming">Toys & Gaming</option>
                                    <option value="Books & Stationary">Books & Stationary</option>
                                </select>
                            </li>
                            <li id="a-z"><button type="button" class="btn mt-2 mx-2 rounded-3 bg-white">Sort A to
                                    Z</button></li>
                            <li id="z-a"><button type="button" class="btn mt-2 mx-2 rounded-3 bg-white">Sort Z to
                                    A</button></li>
                            <li id="H-L"><button type="button" class="btn mt-2 mx-2 rounded-3 bg-white">Price: High to
                                    Low</button></li>
                            <li id="L-H"><button type="button" class="btn mt-2 mx-2 rounded-3 bg-white">Price: Low to
                                    High</button></li>
                            <li><button type="reset" class="btn mt-2 mx-2 rounded-3 bg-white">Reset</button></li>
                        </ul>
                    </div>
                    <thead>
                        <tr>
                            <th>Sr no.</th>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Price</th>
                            <th>Category</th>
                            <th>Stock</th>
                            <th>Description</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Bootstrap JavaScript Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.min.js"
        integrity="sha384-BBtl+eGJRgqQAUMxJ7pMwbEyER4l1g+O15P+16Ep7Q9Q+zqX6gSbd85u4mG4QzX+"
        crossorigin="anonymous"></script>
    <script src="./js/script.js"></script>
</body>

</html>
